<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oasis · Mindful Meditation</title>


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #231942 0%, #0f0c1b 100%);
      color: #f1f5f9;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }


    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(59, 130, 246, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
      pointer-events: none;
      z-index: 0;
      transition: transform 4s ease-in-out;
    }


    .header {
      position: absolute;
      top: 30px;
      left: 30px;
      right: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .back-btn {
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      font-weight: 500;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.4);
      color: white;
      transform: translateY(-2px);
    }

    #title {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa 0%, #38bdf8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
    }


    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }


    .state-panel {
      text-align: center;
    }

    #state {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 5px;
      color: white;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
      transition: all 0.5s ease;
    }

    #timer {
      font-size: 1.3rem;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 1px;
    }


    .circle-container {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .circle-halo {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(96, 165, 250, 0.1);
      animation: pulse-ring 2.5s infinite;
      pointer-events: none;
    }

    #circle {
      width: 90px;
      height: 90px;
      background: radial-gradient(circle, #38bdf8 0%, #2563eb 100%);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.3);
      transition: transform 4s ease-in-out, background 4s ease-in-out, box-shadow 4s ease-in-out;
      position: relative;
      z-index: 1;
    }


    .controls-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group-row {
      display: flex;
      gap: 15px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-wrapper label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
      width: 100%;
    }

    input:focus, select:focus {
      border-color: #8b5cf6;
      background: rgba(139, 92, 246, 0.1);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
    }

    input::placeholder {
      color: #64748b;
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }

    .btn-start {
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
      color: white;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
    }

    .btn-stop {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn-stop:hover {
      background: rgba(239, 68, 68, 0.2);
      color: white;
    }


    @keyframes pulse-ring {
      0% {
        transform: scale(0.65);
        opacity: 0;
      }
      50% {
        opacity: 0.5;
      }
      100% {
        transform: scale(1.1);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow" id="bg-glow"></div>

  <div class="header">
    <a href="/" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Oasis
    </a>
    <div id="title">Oasis Meditation</div>
  </div>

  <div class="main-container">

    <div class="state-panel">
      <div id="state">Ready</div>
      <div id="timer">00:00</div>
    </div>

    <div class="circle-container">
      <div class="circle-halo"></div>
      <div id="circle"></div>
    </div>

    <div class="controls-panel">
      <div class="input-group-row">
        <div class="input-wrapper">
          <label for="minutes">Session Duration</label>
          <input type="number" id="minutes" placeholder="Minutes" min="1" value="2">
        </div>

        <div class="input-wrapper">
          <label for="speed">Breathing Tempo</label>
          <select id="speed">
            <option value="slow">Slow & Deep</option>
            <option value="medium" selected>Moderate</option>
            <option value="fast">Energizing</option>
          </select>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn-start" onclick="start()">Start Practice</button>
        <button class="btn-stop" onclick="stop()">End Session</button>
      </div>
    </div>

  </div>

  <script>
    const circle = document.getElementById("circle");
    const state = document.getElementById("state");
    const timerText = document.getElementById("timer");
    const speedSelect = document.getElementById("speed");
    const bgGlow = document.getElementById("bg-glow");

    let sessionTimer;
    let breathCycle;

    let totalSeconds = 0;
    let remaining = 0;


    function getSpeed() {
      if (speedSelect.value === "slow") return 6000;
      if (speedSelect.value === "fast") return 2500;
      return 4000;
    }

    function syncTransitionSpeed(ms) {

      circle.style.transition = `transform ${ms}ms ease-in-out, background ${ms}ms ease-in-out, box-shadow ${ms}ms ease-in-out`;
      bgGlow.style.transition = `transform ${ms}ms ease-in-out, opacity ${ms}ms ease-in-out`;
    }


    function inhale() {
      circle.style.transform = "scale(2.3)";
      circle.style.background = "radial-gradient(circle, #60a5fa 0%, #3b82f6 100%)";
      circle.style.boxShadow = "0 0 50px rgba(59, 130, 246, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.4)";
      
      bgGlow.style.transform = "scale(1.4)";
      bgGlow.style.opacity = "1";
      
      state.innerText = "Inhale";
      state.style.color = "#60a5fa";
      state.style.textShadow = "0 0 30px rgba(96, 165, 250, 0.5)";
    }

    function exhale() {
      circle.style.transform = "scale(1)";
      circle.style.background = "radial-gradient(circle, #a78bfa 0%, #7c3aed 100%)";
      circle.style.boxShadow = "0 0 30px rgba(124, 58, 237, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.2)";
      
      bgGlow.style.transform = "scale(0.9)";
      bgGlow.style.opacity = "0.5";
      
      state.innerText = "Exhale";
      state.style.color = "#a78bfa";
      state.style.textShadow = "0 0 30px rgba(167, 139, 250, 0.5)";
    }


    function updateTimer() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;

      timerText.innerText =
        String(m).padStart(2,"0") + ":" +
        String(s).padStart(2,"0");
    }


    function start() {
      stop();

      const mins = parseInt(document.getElementById("minutes").value);
      if (!mins) return;

      totalSeconds = mins * 60;
      remaining = totalSeconds;

      updateTimer();

      const speed = getSpeed();
      syncTransitionSpeed(speed);
      let inhalePhase = true;

      function cycle() {
        if (inhalePhase) inhale();
        else exhale();
        inhalePhase = !inhalePhase;
      }

      cycle();
      breathCycle = setInterval(cycle, speed);

      sessionTimer = setInterval(() => {
        remaining--;
        updateTimer();

        if (remaining <= 0) {
          stop();
          state.innerText = "Session Complete";
          state.style.color = "#34d399";
          state.style.textShadow = "0 0 30px rgba(52, 211, 153, 0.5)";
          circle.style.transform = "scale(1.2)";
          circle.style.background = "radial-gradient(circle, #34d399 0%, #059669 100%)";
          circle.style.boxShadow = "0 0 40px rgba(52, 211, 153, 0.6)";


          const userId = localStorage.getItem("oasis_user_id") || "Explorer";
          fetch("/api/game/progress", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: userId,
              mission_id: "breathing",
              points: 40,
              mood: "calm",
              note: "Completed mindful breathing session."
            })
          }).catch(console.error);
        }
      }, 1000);
    }

    function stop() {
      clearInterval(sessionTimer);
      clearInterval(breathCycle);

      circle.style.transform = "scale(1)";
      circle.style.background = "radial-gradient(circle, #38bdf8 0%, #2563eb 100%)";
      circle.style.boxShadow = "0 0 30px rgba(37, 99, 235, 0.4)";
      
      state.innerText = "Stopped";
      state.style.color = "white";
      state.style.textShadow = "none";
      timerText.innerText = "00:00";
      
      bgGlow.style.transform = "scale(1)";
      bgGlow.style.opacity = "0.5";
    }
  </script>
</body>
</html>
