<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle, #3a2e5d, #1a1a2e);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        .mode-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .mode-option:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .mode-option.active {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="glass-card">
        <h1 class="text-2xl font-bold mb-8 text-center">Frontend Settings</h1>

        <div class="space-y-4">
            <div class="mode-option {% if ui_mode == 'drift' %}active{% endif %}" onclick="setMode('drift')">
                <div class="icon-box">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold">Drift Mode</h3>
                    <p class="text-xs text-gray-400">Floating Apple Watch style circles</p>
                </div>
            </div>

            <div class="mode-option {% if ui_mode == 'grind' %}active{% endif %}" onclick="setMode('grind')">
                <div class="icon-box">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold">Grind Mode</h3>
                    <p class="text-xs text-gray-400">Stable grid of glass cards</p>
                </div>
            </div>
        </div>

        <div class="mt-10 flex justify-between items-center">
            <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">← Back to Oasis</a>
            <button onclick="saveSettings()"
                class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-xl transition-all">Save
                Changes</button>
        </div>
    </div>

    <script>
        let currentMode = '{{ ui_mode }}';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-option').forEach(opt => opt.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function saveSettings() {
            const response = await fetch('/toggle-ui', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: currentMode })
            });
            if (response.ok) {
                window.location.href = '/';
            }
        }
    </script>
</body>

</html>
