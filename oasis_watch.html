<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Watch - Health Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle, #3a2e5d, #1a1a2e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .glass-card {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 24px;
        }

        .spline-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-color: #000;
        }

        .spline-bg-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .nav-sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.6);
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: rgba(139, 92, 246, 0.5);
            color: white;
            transform: scale(1.1);
        }

        .nav-tooltip {
            position: absolute;
            left: 60px;
            background: rgba(139, 92, 246, 0.9);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .nav-item:hover .nav-tooltip {
            opacity: 1;
        }

        .metric-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #c4b5fd;
        }

        .ai-insight-card {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(109, 40, 217, 0.1) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
    </style>
</head>

<body>

    <div class="spline-bg-container">
        <iframe src='https://my.spline.design/ailandingpagewebdesign3danimation-8hFNuj0gbBXM1uPdCf3aRUnZ/'
            frameborder='0' width='100%' height='100%'></iframe>
    </div>

    <div class="nav-sidebar">
        <a href="/" class="nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                </path>
            </svg>
            <span class="nav-tooltip">Home</span>
        </a>
        <a href="/activities" class="nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                </path>
            </svg>
            <span class="nav-tooltip">Activities</span>
        </a>
        <a href="/oasis-watch" class="nav-item active">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                </path>
            </svg>
            <span class="nav-tooltip">Oasis Watch</span>
        </a>
        <a href="/chatbot" class="nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                </path>
            </svg>
            <span class="nav-tooltip">Chatbot</span>
        </a>
    </div>

    <main class="w-full max-w-5xl px-6 flex flex-col items-center">
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold mb-2">Oasis Watch</h1>
            <p class="text-gray-400">Connected to Google Fit</p>
        </div>

        <div class="relative">

            <div
                class="w-[360px] h-[440px] bg-black border-[12px] border-[#1e293b] rounded-[60px] relative shadow-[0_0_80px_rgba(139,92,246,0.3)] overflow-hidden flex items-center justify-center">

                <div class="text-center p-8">
                    <div
                        class="w-24 h-24 mx-auto mb-6 bg-gradient-to-br from-blue-500 via-red-500 to-yellow-500 rounded-3xl flex items-center justify-center shadow-lg animate-pulse">
                        <span class="text-white text-5xl font-bold">G</span>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">Health Sync</h2>
                    <p class="text-sm text-gray-400">Active Monitoring</p>

                    <div class="mt-8 flex justify-center gap-4">
                        <div class="w-3 h-3 rounded-full bg-blue-500 animate-bounce"></div>
                        <div class="w-3 h-3 rounded-full bg-red-500 animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500 animate-bounce" style="animation-delay: 0.4s">
                        </div>
                    </div>
                </div>

                <div
                    class="absolute right-[-18px] top-[100px] w-[12px] h-[60px] bg-[#334155] rounded-r-lg border-y border-r border-white/10">
                </div>
            </div>

            <p class="text-xs text-white/30 text-center mt-6 uppercase tracking-widest font-bold">Syncing your wellness
                metrics</p>
        </div>

        <div class="mt-12 w-full max-w-4xl">
            <button onclick="document.getElementById('live-metrics').classList.toggle('hidden')"
                class="w-full py-4 glass-card flex items-center justify-center gap-2 hover:bg-white/10 transition-all rounded-2xl mb-6">
                <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                    </path>
                </svg>
                <span class="font-bold text-sm uppercase tracking-wider">Show Live Health Metrics</span>
            </button>

            <div id="live-metrics" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="glass-card p-8 flex flex-col items-center text-center">
                        <h3 class="text-gray-400 font-medium mb-2">Avg Heart Rate</h3>
                        <div class="metric-value" id="avg-hr">-- BPM</div>
                    </div>
                    <div class="glass-card p-8 flex flex-col items-center text-center">
                        <h3 class="text-gray-400 font-medium mb-2">Sleep Restoration</h3>
                        <div class="metric-value" id="sleep-segments">-- Segments</div>
                    </div>
                </div>
                <div class="glass-card p-8 mb-8">
                    <div class="h-64">
                        <canvas id="hrChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let hrChart;

        async function fetchHealthData() {
            try {
                const response = await fetch('/api/health_data');
                const data = await response.json();

                if (data.error === "Unauthorized") {

                    return;
                }

                if (data.error) {
                    console.error("Health Data error:", data.error);
                    return;
                }

                updateUI(data);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function updateUI(data) {
            const avgHrElem = document.getElementById('avg-hr');
            const sleepElem = document.getElementById('sleep-segments');
            const aiElem = document.getElementById('stress-analysis');

            if (!data.heart_rate_history || data.heart_rate_history.length === 0) {
                avgHrElem.innerText = "No Data";
                avgHrElem.style.color = "#666";
                renderChart([]);
            } else {
                avgHrElem.innerText = `${data.avg_heart_rate} BPM`;
                avgHrElem.style.color = "#c4b5fd";
                renderChart(data.heart_rate_history);
            }

            sleepElem.innerText = `${data.sleep_segments} Segments`;
            aiElem.innerText = data.stress_analysis;
        }

        function renderChart(history) {
            const ctx = document.getElementById('hrChart').getContext('2d');
            const labels = history.map((_, i) => `T-${history.length - i}`);

            if (hrChart) hrChart.destroy();

            hrChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Heart Rate (BPM)',
                        data: history,
                        borderColor: '#a78bfa',
                        backgroundColor: 'rgba(167, 139, 250, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'rgba(255,255,255,0.5)' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: 'rgba(255,255,255,0.3)' }
                        }
                    }
                }
            });
        }

        function syncData() {

            window.location.href = "/authorize?next=/oasis-watch";
        }

        window.onload = fetchHealthData;
    </script>

</body>

</html>
